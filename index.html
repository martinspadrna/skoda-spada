<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rotace a kalkulačky</title>

<link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/4/4d/Skoda_Auto_logo_2022.svg">

<style>
body{
 font-family:Arial;
 background:#0b0f0c;
 color:white;
 margin:0;
 padding:15px;
}

h1{
 text-align:center;
 margin:8px 0 0 0;
 font-size:24px;
 color:#4CAF50;
}

#shiftTime{
 text-align:center;
 font-size:14px;
 color:#777;
 margin-top:4px;
}

.version{
 position:fixed;
 bottom:6px;
 right:10px;
 font-size:12px;
 color:#777;
}

.homeBtn{
 position:fixed;
 top:10px;
 right:10px;
 width:45px;
 height:45px;
 border:none;
 border-radius:10px;
 background:#1c1f1d;
 color:#4CAF50;
 font-size:20px;
 z-index:999;
}

.page{display:none;}
.active{display:block;}

.grid{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:12px;
 margin-top:15px;
}

.tile{
 background:#151a17;
 border:2px solid #4CAF50;
 border-radius:12px;
 height:110px;
 display:flex;
 justify-content:center;
 align-items:center;
 font-size:18px;
}

.big{grid-column:span 2;height:140px;font-size:22px;}

button{
 width:100%;
 padding:14px;
 margin-top:10px;
 background:#4CAF50;
 border:none;
 border-radius:10px;
 color:white;
 font-size:18px;
}

.card{
 background:#151a17;
 padding:12px;
 margin-top:10px;
 border-radius:10px;
}

input{
 width:100%;
 padding:16px;
 margin-top:6px;
 margin-bottom:12px;
 border-radius:10px;
 border:2px solid #4CAF50;
 background:#0f1411;
 color:white;
 font-size:18px;
 box-sizing:border-box;
}

label{
 display:block;
 margin-top:8px;
 color:#ccc;
 font-size:14px;
}

/* BRUSY */
.bgrid{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:10px;
}

.indexGrid{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:10px;
}

.freeWrap{
 display:flex;
 gap:10px;
}

.freeWrap .bbtn{flex:1;}

.bbtn{
 padding:14px;
 border-radius:10px;
 text-align:center;
 cursor:pointer;
 min-height:48px;
 display:flex;
 align-items:center;
 justify-content:center;
 border:2px solid #4CAF50;
 background:#1c1f1d;
 user-select:none;
}

.ad{background:#1a3d5c;}
.ae{background:#1f4d2f;}
.ah{background:#6b3f14;}
.adv{background:#2a2a2a;}
.aev{background:#2a3b2f;}

.activeMachine{
 outline:3px solid #7CFF7C;
}

.activeIndex{
 outline:3px solid #ffffff;
}
</style>
</head>

<body>

<button class="homeBtn" onclick="show('home')">🏠</button>

<h1>Rotace a kalkulačky</h1>
<div id="shiftTime">Načítám směnu...</div>
<div class="version">v0.44 | Martin Špadrna</div>

<!-- HOME -->
<div id="home" class="page active">
<div class="grid">
 <div class="tile big" onclick="show('rotace')">ROTACE</div>
 <div class="tile" onclick="show('frezky')">Frézky</div>
 <div class="tile" onclick="show('brusy')">Brusy</div>
 <div class="tile" onclick="show('pracka')">Pračka</div>
</div>
</div>

<!-- ROTACE -->
<div id="rotace" class="page">
<h3 style="text-align:center;">Rotace</h3>
<p style="text-align:center;">vyšší dívčí, ale snad bude</p>
</div>

<!-- FREZKY -->
<div id="frezky" class="page">
<h3 style="text-align:center;">Frézky</h3>

<label>Hotovo kusů:</label>
<input id="f_kusy" type="number">

<button onclick="calcF()">Spočítej kolik ještě stihnu</button>
<div class="card" id="outF"></div>
</div>

<!-- BRUSY -->
<div id="brusy" class="page">
<h3 style="text-align:center;">Brusy</h3>

<div class="bgrid">
 <div class="bbtn" id="m_TBKR01" onclick="setMachine('TBKR01')">TBKR01</div>
 <div class="bbtn" id="m_TBKR07" onclick="setMachine('TBKR07')">TBKR07</div>
</div>

<div class="indexGrid">
 <div class="bbtn ad" id="p_AD" onclick="setProg('AD')">AD</div>
 <div class="bbtn ae" id="p_AE" onclick="setProg('AE')">AE</div>
 <div class="bbtn ah" id="p_AH" onclick="setProg('AH')">AH</div>

 <div class="freeWrap">
  <div class="bbtn adv" id="p_ADV" onclick="setProg('ADV')">AD volné</div>
  <div class="bbtn aev" id="p_AEV" onclick="setProg('AEV')">AE volné</div>
 </div>
</div>

<label>Hotových kusů v dávce:</label>
<input id="davka" type="number">

<label>Kusů do orovnání:</label>
<input id="orovnani" type="number">

<label>Celkem zatím nabroušeno:</label>
<input id="celkem" type="number">

<button onclick="calcBrusy()">Spočítej kolik ještě stihnu</button>

<div class="card" id="outB"></div>
</div>

<!-- PRAČKA -->
<div id="pracka" class="page">
<h3 style="text-align:center;">Pračka</h3>

<label>Hotovo kusů:</label>
<input id="p_kusy" type="number">

<button onclick="calcP()">Spočítej kolik ještě stihnu</button>
<div class="card" id="outP"></div>
</div>

<script>

/* NAV */
function show(id){
 document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

/* SMĚNA */
function getShiftEnd(now){
 let d=new Date(now);
 let day=d.getDay();

 if(day===0 && d.getHours()>=6 && d.getHours()<14){
  let e=new Date(d);
  e.setHours(14,0,0,0);
  return e;
 }

 if(d.getHours()>=6 && d.getHours()<18){
  let e=new Date(d);
  e.setHours(18,0,0,0);
  return e;
 }else{
  let e=new Date(d);
  if(d.getHours()>=18) e.setDate(e.getDate()+1);
  e.setHours(6,0,0,0);
  return e;
 }
}

/* TIMER */
function updateShift(){
 let now=new Date();
 let end=getShiftEnd(now);

 let diff=end-now;
 let h=Math.floor(diff/3600000);
 let m=Math.floor((diff%3600000)/60000);

 document.getElementById("shiftTime").innerText=
 "Do konce směny zbývá "+h+" h "+m+" min";
}
setInterval(updateShift,10000);
updateShift();

/* FREZKY */
function calcF(){
 let sec=Math.max(0,(getShiftEnd(new Date())-new Date())/1000);
 let ks=Math.floor(sec/60);

 let hotovo=parseInt(document.getElementById("f_kusy").value)||0;

 document.getElementById("outF").innerHTML=
 "Do konce směny: "+ks+" ks<br>Celkem: "+(hotovo+ks);
}

/* PRAČKA */
function calcP(){
 let sec=Math.max(0,(getShiftEnd(new Date())-new Date())/1000);
 let ks=Math.floor(sec/30);

 let hotovo=parseInt(document.getElementById("p_kusy").value)||0;

 document.getElementById("outP").innerHTML=
 "Do konce směny: "+ks+" ks<br>Celkem: "+(hotovo+ks);
}

/* BRUSY */
let machine="TBKR01";
let prog="AD";

function setMachine(m){
 machine=m;
 updateUI();
}

function setProg(p){
 prog=p;
 updateUI();
}

function updateUI(){

 document.querySelectorAll(".bbtn").forEach(b=>{
  b.classList.remove("activeMachine","activeIndex");
 });

 let m=document.getElementById("m_"+machine);
 if(m) m.classList.add("activeMachine");

 let p=document.getElementById("p_"+prog);
 if(p) p.classList.add("activeIndex");
}

function calcBrusy(){
 let sec=Math.max(0,(getShiftEnd(new Date())-new Date())/1000);
 let ks=Math.floor(sec/65);

 let celkem=parseInt(document.getElementById("celkem").value)||0;

 document.getElementById("outB").innerHTML=
 "Do konce směny: "+ks+" ks<br>Celkem: "+(celkem+ks);
}

updateUI();

</script>

</body>
</html>
