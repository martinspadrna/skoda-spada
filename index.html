<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rotace a kalkulačky</title>

<link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/4/4d/Skoda_Auto_logo_2022.svg">

<style>
body{
 font-family:Arial;
 background:#0b0f0c;
 color:white;
 margin:0;
 padding:15px;
}

h2,h3{text-align:center;color:#4CAF50;}

.homeBtn{
 position:fixed;top:10px;right:10px;
 width:45px;height:45px;
 border:none;border-radius:10px;
 background:#1c1f1d;
 color:#4CAF50;
 font-size:20px;
}

.page{display:none;}
.active{display:block;}

.grid{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:12px;
}

.tile{
 background:#151a17;
 border:2px solid #4CAF50;
 border-radius:12px;
 height:110px;
 display:flex;
 justify-content:center;
 align-items:center;
 font-size:18px;
}

.big{grid-column:span 2;height:140px;font-size:22px;}

button{
 width:100%;
 padding:14px;
 margin-top:10px;
 background:#4CAF50;
 border:none;
 border-radius:10px;
 color:white;
 font-size:18px;
}

.card{
 background:#151a17;
 padding:12px;
 margin-top:10px;
 border-radius:10px;
}

.bgrid{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:10px;
}

.bbtn{
 padding:14px;
 border:2px solid #4CAF50;
 background:#1c1f1d;
 border-radius:10px;
 text-align:center;
}

.version{
 position:fixed;
 bottom:6px;
 right:10px;
 font-size:12px;
 color:#777;
}
</style>

</head>

<body>

<button class="homeBtn" onclick="show('home')">🏠</button>

<div class="version">v0.21 | Martin Špadrna</div>

<!-- HOME -->
<div id="home" class="page active">

<h2>Rotace a kalkulačky</h2>

<div class="grid">
 <div class="tile big" onclick="show('rotace')">ROTACE</div>
 <div class="tile" onclick="show('frezky')">Frézky</div>
 <div class="tile" onclick="show('brusy')">Brusy</div>
 <div class="tile" onclick="show('pracka')">Pračka</div>
</div>

</div>

<!-- ROTACE -->
<div id="rotace" class="page">
<h3>Rotace</h3>
<p style="text-align:center;">vyšší dívčí, ale snad bude</p>
</div>

<!-- BRUSY -->
<div id="brusy" class="page">

<h3>Brusy</h3>

<div class="bgrid">
 <div class="bbtn" onclick="setMachine('TBKR01')">TBKR01</div>
 <div class="bbtn" onclick="setMachine('TBKR07')">TBKR07</div>
</div>

<p id="machineLabel"></p>

<div class="bgrid">
 <div class="bbtn" onclick="setProg('AD')">AD</div>
 <div class="bbtn" onclick="setProg('AE')">AE</div>
 <div class="bbtn" onclick="setProg('AH')">AH</div>
 <div class="bbtn" onclick="setProg('ADV')">AD volné</div>
</div>

<p id="progLabel"></p>

<label>Kusů do orovnávání:</label>
<input id="orovnani" type="number">

<label>Celkem hotovo:</label>
<input id="celkem" type="number">

<button onclick="calcBrusy()">Spočítej kolik ještě stihnu</button>

<div class="card" id="outB"></div>

</div>

<!-- FREZKY -->
<div id="frezky" class="page">

<h3>Frézky</h3>

<input id="f_kusy" type="number" placeholder="hotovo kusů">

<button onclick="calcF()">Spočítej kolik ještě stihnu</button>

<div class="card" id="outF"></div>

</div>

<!-- PRAČKA -->
<div id="pracka" class="page">

<h3>Pračka</h3>

<button onclick="calcP()">Spočítej kolik ještě stihnu</button>

<div class="card" id="outP"></div>

</div>

<script>

// NAV
function show(id){
 document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

// BRUSY
const times={
 TBKR01:{AD:65,AE:59,AH:70,ADV:65},
 TBKR07:{AD:68,AE:61,AH:73,ADV:68}
};

let machine="TBKR01";
let prog="AD";

function setMachine(m){
 machine=m;
 document.getElementById("machineLabel").innerText="Stroj: "+m;
}

function setProg(p){
 prog=p;
 document.getElementById("progLabel").innerText="Program: "+p;
}

// SMĚNA
function endShift(){
 let d=new Date();
 let e=new Date(d);

 if(d.getHours()>=6 && d.getHours()<18){
  e.setHours(18,0,0,0);
 }else{
  e.setHours(6,0,0,0);
  e.setDate(e.getDate()+1);
 }
 return e;
}

// BRUSY
function calcBrusy(){

 let sec=(endShift()-new Date())/1000;
 let ks=Math.floor(sec/times[machine][prog]);

 let celkem=parseInt(document.getElementById("celkem").value)||0;

 let total=celkem+ks;

 let batch=32;

 let d1=Math.floor(ks/batch);
 let d2=Math.floor(total/batch);

 document.getElementById("outB").innerHTML=
 "Do konce směny stihneš "+ks+" ks, tj. "+d1+" dávek<br>"+
 "Celkově budeš mít "+total+" ks, "+d2+" dávek";
}

// FREZKY
function calcF(){

 let sec=(endShift()-new Date())/1000;
 let ks=Math.floor(sec/60);

 let batch=32;

 let d=Math.floor(ks/batch);
 let kal=(ks/64).toFixed(2);

 document.getElementById("outF").innerHTML=
 "Do konce směny stihneš "+ks+" ks, tj. "+d+" dávek ("+kal+" kalírenských)";
}

// PRAČKA
function calcP(){

 let sec=(endShift()-new Date())/1000;
 let ks=Math.floor(sec/30);

 let batch=32;

 let d=Math.floor(ks/batch);

 document.getElementById("outP").innerHTML=
 "Do konce směny stihneš "+ks+" ks, tj. "+d+" dávek";
}

</script>

</body>
</html>
